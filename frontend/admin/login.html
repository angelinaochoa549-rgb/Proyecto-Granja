<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Manjares Del Campo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b4a;
    --green-light: #25996b;
    --gold: #d4a017;
    --cream: #f0f7f0;
    --text: #1a2e1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Lato', sans-serif;
    background: linear-gradient(135deg, #0d3d2a 0%, #1a6b4a 60%, #0d3d2a 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: white; border-radius: 16px;
    padding: 48px 40px; width: 400px; max-width: 95vw;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  }
  .login-logo {
    text-align: center; margin-bottom: 32px;
  }
  .login-logo .icon {
    width: 64px; height: 64px; background: var(--gold);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 12px;
  }
  .login-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px; color: var(--green); line-height: 1.3;
  }
  .login-logo p { font-size: 13px; color: #888; margin-top: 4px; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block; font-weight: 700; font-size: 13px;
    color: var(--text); margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    border: 1.5px solid #d6ebd6; border-radius: 8px;
    padding: 12px 16px; font-size: 15px;
    font-family: 'Lato', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--green); }

  .btn-login {
    width: 100%; padding: 14px;
    background: var(--green); color: white;
    border: none; border-radius: 8px;
    font-size: 16px; font-weight: 700;
    font-family: 'Lato', sans-serif;
    cursor: pointer; transition: background 0.2s;
    margin-top: 8px;
  }
  .btn-login:hover { background: var(--green-light); }
  .btn-login:disabled { background: #aaa; cursor: not-allowed; }

  .error-msg {
    background: #fff0f0; border: 1px solid #ffcccc;
    border-radius: 6px; padding: 10px 14px;
    color: #c0392b; font-size: 13px; margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  .back-link {
    display: block; text-align: center; margin-top: 24px;
    color: #888; font-size: 13px; text-decoration: none;
  }
  .back-link:hover { color: var(--green); }

  .loading-spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.6s linear infinite; vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="icon">🌿</div>
    <h1>Panel de Administración</h1>
    <p>Manjares Del Campo</p>
  </div>

  <div class="error-msg" id="error-msg">
    Email o contraseña incorrectos. Intenta de nuevo.
  </div>

  <form id="login-form">
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="admin@manjaresdelcampo.co"
             autocomplete="email" required />
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••"
             autocomplete="current-password" required />
    </div>
    <button type="submit" class="btn-login" id="login-btn">
      Iniciar sesión
    </button>
  </form>

  <a href="../index.html" class="back-link">← Volver a la tienda</a>
</div>

<script>

  const API_BASE = 'http://localhost:8000';

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errorEl = document.getElementById('error-msg');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // UI de carga
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span>Verificando...';
    errorEl.classList.remove('show');

    try {
      const res = await fetch(`${API_BASE}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      if (!res.ok) throw new Error('Credenciales inválidas');

      const data = await res.json();

      // Guardar token en sessionStorage
      sessionStorage.setItem('admin_token', data.access_token);
      sessionStorage.setItem('admin_email', email);

      // Redirigir al dashboard
      window.location.href = 'dashboard.html';

    } catch (err) {
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = 'Iniciar sesión';
    }
  });

  // Si ya tiene sesión, redirigir
  if (sessionStorage.getItem('admin_token')) {
    window.location.href = 'dashboard.html';
  }
</script>

</body>
</html>
